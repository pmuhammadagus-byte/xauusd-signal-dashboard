# Render Blueprint — XAU/USD Live Signal Dashboard
# https://render.com/docs/blueprint-spec
# One-click deploy: click "New +" → "Blueprint" → select this repo

services:
  - type: web
    name: xauusd-signal-dashboard
    runtime: node
    plan: free
    region: singapore
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/signal
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: DATABASE_URL
        value: file:./db/custom.db
        # SQLite file — for production-grade persistence, swap with
        # Render Postgres: https://render.com/docs/databases
    # NOTE: PORT is auto-injected by Render for web services — do not declare it.
    # The Next.js standalone server reads process.env.PORT automatically.
    numInstances: 1
